<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Eugene Rossouw</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #ffffff;
      text-align: center;
      padding: 40px 20px;
      margin: 0;
    }
    .card {
      max-width: 420px;
      margin: auto;
      background: #1e293b;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }
    h1 {
      margin-bottom: 5px;
    }
    p.subtitle {
      color: #94a3b8;
      margin-bottom: 25px;
    }
    a.button {
      display: block;
      margin: 10px 0;
      padding: 12px;
      background: #334155;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      transition: background 0.2s ease;
    }
    a.button:hover {
      background: #475569;
    }
    .contact {
      margin-bottom: 20px;
      font-size: 14px;
      color: #cbd5e1;
    }
    iframe {
      margin-top: 20px;
    }
    footer {
      margin-top: 25px;
      font-size: 12px;
      color: #64748b;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Eugene Rossouw</h1>
    <p class="subtitle">Cybersecurity | Collaboration Technology | AV Solutions</p>

    <div class="contact">
      📧 eugene_rossouw@hotmail.com<br>
      📱 +64 27 505 0110<br>
      📍 Auckland, New Zealand
    </div>

    <!-- Save Contact / QR -->
    <div class="save-contact">
      <a href="contact.vcf" download class="qr-wrapper">
        <img src="images/qr-stylized.png" alt="Scan to Save Contact">
      </a>
    </div>
    <a class="button" href="mailto:eugene_rossouw@hotmail.com">Email</a>
    <a class="button" href="tel:+64275050110">Call</a>
    <a class="button" href="https://www.linkedin.com/in/eugenerossouw/" target="_blank">LinkedIn</a>

    <!-- Credentials / Badges -->
    <div class="credentials-wrapper">
      <div class="credentials">
        <a href="https://www.credly.com/users/eugene-rossouw"><img src="images/ccnp-collaboration.png" alt="CCNP Collaboration Badge"></a>
        <a href="https://learn.microsoft.com/en-us/users/eugenerossouw/transcript/v2y8psj205zeoor?tab=credentials-tab"><img src="images/microsoft-enterprise-admin.png" alt="Microsoft Enterprise Admin Badge"></a>
        <a href="https://learn.microsoft.com/en-us/users/eugenerossouw/transcript/v2y8psj205zeoor?tab=credentials-tab"><img src="images/microsoft-teams-admin.png" alt="Microsoft Teams Admin Badge"></a>
        <a href="https://www.credly.com/users/eugene-rossouw"><img src="images/google-cloud-associate.png" alt="Google Cloud Associate Badge"></a>
      </div>
    </div>

    <!-- Iframe -->
<div class="iframe-wrapper">
  <iframe src="https://tryhackme.com/api/v2/badges/public-profile?userPublicId=1145654" title="TryHackMe Badges"></iframe>
</div>

    <footer>
      © 2026 Eugene Rossouw
    </footer>
  </div>
</body>
</html>
